services:
  db:
    image: postgres:16
    container_name: ecocare-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecocare}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecocare -d ecocare"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ecocare-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: EcoCare Backend API
      APP_ENV: production
      API_PREFIX: /api
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ecocare}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      VIRTUAL_HOST: api.trinova.it.com
      VIRTUAL_PORT: 8000
      LETSENCRYPT_HOST: api.trinova.it.com
      LETSENCRYPT_EMAIL: trungnguyen.19972707@gmail.com
    networks:
      - web

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ecocare-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: https://api.trinova.it.com
      VIRTUAL_HOST: trinova.it.com
      VIRTUAL_PORT: 3000
      LETSENCRYPT_HOST: trinova.it.com
      LETSENCRYPT_EMAIL: trungnguyen.19972707@gmail.com
    env_file:
      - .env.prod
    networks:
      - web

volumes:
  postgres_data:
networks:
  web:
    external: true
