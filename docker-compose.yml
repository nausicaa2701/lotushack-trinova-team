services:
  db:
    image: postgres:16
    container_name: ecocare-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecocare
      POSTGRES_USER: ecocare
      POSTGRES_PASSWORD: ecocare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecocare -d ecocare"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ecocare-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: EcoCare Backend API
      APP_ENV: development
      API_PREFIX: /api
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ecocare
      POSTGRES_USER: ecocare
      POSTGRES_PASSWORD: ecocare
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ecocare-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
