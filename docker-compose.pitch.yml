version: '3.8'

services:
  pitch-deck:
    image: nginx:alpine
    container_name: trinova-pitch-deck
    restart: unless-stopped
    volumes:
      - ./pitch-site:/usr/share/nginx/html:ro
    labels:
      - "com.df.notify=true"
      - "com.df.distribute=true"
      - "com.df.port=80"
      - "com.df.servicePath=/pitch-deck"
    networks:
      - proxy
    expose:
      - "80"

networks:
  proxy:
    external: true
    name: proxy
